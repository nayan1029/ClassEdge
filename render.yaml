services:
  - type: web
    name: studybuddy-backend
    env: java
    rootDir: backend
    buildCommand: mvn -B -DskipTests package
    startCommand: java -jar target/*.jar
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: JDBC_DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: H2_CONSOLE_ENABLED
        value: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MAIL_ENABLED
        value: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
